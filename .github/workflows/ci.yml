name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env: { POSTGRES_PASSWORD: p, POSTGRES_DB: rpow_test }
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:p@localhost:55432/rpow_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22.20.0', cache: 'npm' }
      - run: npm ci
      - run: npm run build --workspace @rpow/shared
      - run: npm run build --workspace @rpow/server
      - run: npm test
  deployment-note:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "CI passed on main."
          echo "Production API deploys are manual on the OVH VPS; see docs/RUNBOOK.md."
          echo "Netlify deploys the web app from main through its own integration."
