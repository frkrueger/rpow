<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#08080a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" fill="white" opacity="0.015"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- Panel -->
  <rect x="60" y="40" width="1080" height="550" fill="none" stroke="#6ee7b7" stroke-width="1" opacity="0.2"/>
  <rect x="60" y="40" width="1080" height="44" fill="#6ee7b7" fill-opacity="0.03"/>
  <line x1="60" y1="84" x2="1140" y2="84" stroke="#6ee7b7" stroke-width="1" opacity="0.2"/>

  <text x="56" y="37" font-family="monospace" font-size="10" fill="#6ee7b7" opacity="0.4">+</text>
  <text x="1136" y="597" font-family="monospace" font-size="10" fill="#6ee7b7" opacity="0.4">+</text>

  <text x="80" y="68" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#6ee7b7" letter-spacing="3">NETWORK STATS</text>
  <circle cx="1090" cy="63" r="4" fill="#6ee7b7" opacity="0.8"/>
  <text x="1070" y="68" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6ee7b7" text-anchor="end">LIVE</text>

  <!-- Title -->
  <text x="100" y="145" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="48" fill="#6ee7b7">RPOW2 STATS</text>
  <text x="100" y="180" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#6b6b6b">Real-time proof-of-work network statistics</text>

  <!-- Big numbers -->
  <text x="100" y="250" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b6b6b" letter-spacing="2">MINERS</text>
  <text x="100" y="300" font-family="'IBM Plex Mono', monospace" font-size="56" fill="#fbbf24" font-weight="700">40,000+</text>

  <text x="520" y="250" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b6b6b" letter-spacing="2">MINTED</text>
  <text x="520" y="300" font-family="'IBM Plex Mono', monospace" font-size="56" fill="#6ee7b7" font-weight="700">9.9M</text>

  <text x="830" y="250" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b6b6b" letter-spacing="2">CAP</text>
  <text x="830" y="300" font-family="'IBM Plex Mono', monospace" font-size="56" fill="#e8e3d3" font-weight="700">19M</text>

  <!-- Supply bar -->
  <text x="100" y="360" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#6b6b6b" letter-spacing="2">SUPPLY PROGRESS — 52.2%</text>
  <rect x="100" y="375" width="1000" height="6" fill="#3a3a3a"/>
  <rect x="100" y="375" width="522" height="6" fill="#6ee7b7"/>

  <!-- Bottom stats -->
  <rect x="100" y="420" width="300" height="70" fill="#0d0d10" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.15"/>
  <rect x="401" y="420" width="300" height="70" fill="#0d0d10" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.15"/>
  <rect x="702" y="420" width="300" height="70" fill="#0d0d10" stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.15"/>

  <text x="120" y="443" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b6b6b" letter-spacing="2">DIFFICULTY</text>
  <text x="120" y="475" font-family="'IBM Plex Mono', monospace" font-size="24" fill="#fbbf24" font-weight="600">25 bits</text>

  <text x="421" y="443" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b6b6b" letter-spacing="2">REWARD</text>
  <text x="421" y="475" font-family="'IBM Plex Mono', monospace" font-size="24" fill="#6ee7b7" font-weight="600">0.01 RPOW</text>

  <text x="722" y="443" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b6b6b" letter-spacing="2">HALVING</text>
  <text x="722" y="475" font-family="'IBM Plex Mono', monospace" font-size="24" fill="#e8e3d3" font-weight="600">#0</text>

  <!-- Footer -->
  <text x="100" y="555" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#3a3a3a">stats.rpow2.com — auto-updating every 2 minutes</text>

  <rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
