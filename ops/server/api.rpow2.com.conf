limit_req_zone $binary_remote_addr zone=mining:20m rate=8r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=perip:20m;

upstream rpow_mining {
    server 127.0.0.1:8080;
    keepalive 64;
}

upstream rpow_user {
    server 127.0.0.1:8081;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.rpow2.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.rpow2.com;

    ssl_certificate     /etc/letsencrypt/live/api.rpow2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rpow2.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets on;
    ssl_buffer_size 4k;
    keepalive_timeout 15s;
    keepalive_requests 50;
    client_max_body_size 1m;

    access_log /var/log/nginx/api.rpow2.com.access.log;
    error_log  /var/log/nginx/api.rpow2.com.error.log;

    # CORS — nginx is the single source, strip app headers via proxy_hide_header
    add_header Access-Control-Allow-Origin "https://rpow2.com" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Cookie" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # Max 3 concurrent connections per IP
    limit_conn perip 3;

    # === MINING (clustered workers :8080) ===
    location = /challenge {
        limit_req zone=mining burst=5 nodelay;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_mining;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location = /mint {
        limit_req zone=mining burst=5 nodelay;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_mining;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    # === USER-FACING (dedicated worker :8081) ===
    location /auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
        proxy_connect_timeout 5s;
    }

    location = /me {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location = /activity {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location = /ledger {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    # === EVERYTHING ELSE (mining workers) ===
    location / {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_mining;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }
}
