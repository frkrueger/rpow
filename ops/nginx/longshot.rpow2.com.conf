server {
    listen 80;
    listen [::]:80;
    server_name longshot.rpow2.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name longshot.rpow2.com;

    ssl_certificate     /etc/letsencrypt/live/longshot.rpow2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/longshot.rpow2.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    access_log /var/log/nginx/longshot.rpow2.com.access.log;
    error_log  /var/log/nginx/longshot.rpow2.com.error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location ~* \.(html)$ {
        root /opt/rpow-longshot/dist;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location / {
        root /opt/rpow-longshot/dist;
        try_files $uri $uri/ /index.html;
    }
}
