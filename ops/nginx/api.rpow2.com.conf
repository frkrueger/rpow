limit_req_zone $binary_remote_addr zone=mining:20m rate=2r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=perip:20m;

# Treat /challenge and /mint as authenticated-only at the edge. Bots without a
# session cookie get 401 from nginx without occupying a node worker.
map $cookie_rpow_session $has_session { default 0; "~." 1; }

upstream rpow_mining {
    server 127.0.0.1:8080;
    keepalive 64;
}
upstream rpow_user {
    server 127.0.0.1:8081;
    keepalive 16;
}

server {
    listen 80; listen [::]:80;
    server_name api.rpow2.com;

    # Dynamic CORS for rpow2.com subdomains
    set $cors_origin "";
    if ($http_origin ~* "^https://(rpow2.com|.*.rpow2.com)$") {
        set $cors_origin $http_origin;
    }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl; listen [::]:443 ssl; http2 on;
    server_name api.rpow2.com;

    # Dynamic CORS for rpow2.com subdomains
    set $cors_origin "";
    if ($http_origin ~* "^https://(rpow2.com|.*.rpow2.com)$") {
        set $cors_origin $http_origin;
    }
    ssl_certificate     /etc/letsencrypt/live/api.rpow2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rpow2.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets on;
    ssl_buffer_size 4k;
    keepalive_timeout 15s;
    keepalive_requests 50;
    client_max_body_size 1m;
    access_log /var/log/nginx/api.rpow2.com.access.log;
    error_log  /var/log/nginx/api.rpow2.com.error.log;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Cookie" always;

    if ($request_method = OPTIONS) { return 204; }

    # Block datacenter / bot-farm IPs identified from connection-count
    # outliers (multiple IPs in the same /24 each holding 30-60 ESTAB
    # connections is the signature of a coordinated bot operator).
    deny 64.64.115.162;     # LogicWeb (US hosting)
    deny 216.173.120.184;   # datacenter
    deny 154.6.116.0/24;    # Cogent /24 — multiple IPs from same range hot
    deny 154.6.128.0/24;    # Cogent /24
    deny 38.154.205.0/24;   # Cogent /24
    deny 45.61.98.0/24;     # Quadranet /24

    # Block known bot user agents
    # Block bare Mozilla/5.0 (no browser engine = bot)
    if ($http_user_agent = "Mozilla/5.0") {
        return 403 '{"error":"BLOCKED","message":"invalid user agent"}';
    }
    # Block outdated Chrome versions (bot farms spoofing old UAs)
    if ($http_user_agent ~* "Chrome/(1[01][0-9]|12[0-8]|131)\.0\.0\.0") {
        return 403 '{"error":"BLOCKED","message":"outdated browser"}';
    }
    if ($http_user_agent ~* "(rpow-cli|rpow2-go-miner|rpow2-client|rpow-gpu|rpow2-gpu|rpow2-miner|rpow2-native|rpow2-local|rpow2-rust|rpow-cli-pipeline|rpow2-authorized|Go-http-client|aiohttp|Python-urllib|python-requests|^node$)") {
        return 403 '{"error":"BLOCKED","message":"automated mining clients are not permitted"}';
    }

    limit_conn perip 10;

    # === USER-FACING (dedicated worker :8081) ===
    location /auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s; proxy_connect_timeout 5s;
    }
    location = /me {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s; proxy_connect_timeout 3s;
    }
    location = /activity {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s; proxy_connect_timeout 3s;
    }

    location = /send {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s; proxy_connect_timeout 3s;
    }
    location /api/longshot/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location /api/gladiator/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location /api/trivia/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location /amm/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location /api/favorites/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }

    location = /api/favorites {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
    }
    location = /ledger {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_user;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s; proxy_connect_timeout 3s;
    }
    location = /challenge {
        if ($has_session = 0) { return 401 '{"error":"UNAUTHORIZED","message":"login required"}'; }
        proxy_pass http://rpow_mining;
        # Tighter burst (2 vs 5) sheds load to a saturated backend sooner.
        limit_req zone=mining burst=2 nodelay;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # 10s (was 30s): blocked /challenge fails fast so upstream slots
        # free 3x faster, preventing nginx<->node loopback ESTAB pileup.
        proxy_read_timeout 10s; proxy_connect_timeout 3s;
    }

    # === MINING (clustered workers :8080) ===
    location = /mint {
        if ($has_session = 0) { return 401 '{"error":"UNAUTHORIZED","message":"login required"}'; }
        limit_req zone=mining burst=2 nodelay;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_mining;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # 10s (was 30s): blocked /mint fails fast (returns 503 MINT_BUSY
        # via the node-side statement_timeout) and the upstream slot is
        # released. With 30s, slots pile up nginx<->node loopback as
        # mints queue on shard locks under heavy traffic.
        proxy_read_timeout 10s; proxy_connect_timeout 3s;
    }

    # === EVERYTHING ELSE (mining workers) ===
    location / {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_pass http://rpow_mining;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s; proxy_connect_timeout 3s;
    }
}
