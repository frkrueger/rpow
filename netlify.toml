[build]
  base = "."
  # `npm ci` does a clean install — required so the @rpow/shared workspace symlink
  # gets recreated in node_modules. `npm install` was reusing a stale cached
  # node_modules from when packagePath was auto-detected as apps/web.
  command = "npm ci --workspaces --include-workspace-root && npm run build --workspace @rpow/shared && npm run build --workspace @rpow/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22.20.0"
  # Playwright is a devDep of apps/web for E2E tests only. Skip the ~150MB Chromium download on Netlify builds.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

# Proxy auth verify through rpow2.com so cookie is set on same origin
[[redirects]]
  from = "/auth/verify"
  to = "https://api.rpow2.com/auth/verify"
  status = 200
  force = true
  headers = {X-Forwarded-Host = "rpow2.com"}

# Static pages served directly (before SPA catch-all)
[[redirects]]
  from = "/stats"
  to = "/stats.html"
  status = 200

# SPA fallback — for HashRouter all paths actually live at index.html, so this is belt-and-suspenders.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Production: web client points at the VPS-hosted API (api.rpow2.com)
[context.production.environment]
  VITE_API_BASE_URL = "https://api.rpow2.com"
  # Public Solana mainnet RPC. Pilot-scale; swap for Helius via Netlify
  # dashboard env if/when rate limits start biting.
  VITE_SOLANA_RPC_URL = "https://api.rpow2.com/solana-rpc"

# Branch deploys default to the same API
[context.deploy-preview.environment]
  VITE_API_BASE_URL = "https://api.rpow2.com"
  VITE_SOLANA_RPC_URL = "https://api.rpow2.com/solana-rpc"
