[build]
  base = "."
  # `npm ci` does a clean install — required so the @rpow/shared workspace symlink
  # gets recreated in node_modules. `npm install` was reusing a stale cached
  # node_modules from when packagePath was auto-detected as apps/web.
  # `--include=dev` keeps build tools such as TypeScript and Vite installed even
  # if the Netlify UI has NODE_ENV=production set for the site.
  command = "npm ci --include=dev --workspaces --include-workspace-root && npm run build --workspace @rpow/shared && npm run build --workspace @rpow/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22.20.0"
  # Playwright is a devDep of apps/web for E2E tests only. Skip the ~150MB Chromium download on Netlify builds.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

# SPA fallback — for HashRouter all paths actually live at index.html, so this is belt-and-suspenders.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Production: web client points at the Fly-hosted API
[context.production.environment]
  VITE_API_BASE_URL = "https://api.rpow2.com"

# Branch deploys default to the same API
[context.deploy-preview.environment]
  VITE_API_BASE_URL = "https://api.rpow2.com"
